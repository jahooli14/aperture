name: Idea Engine - Daily Email Digest

on:
  schedule:
    # Run daily at 8:30am UTC
    - cron: '30 8 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send daily email digest
        run: |
          curl -X POST "https://${{ secrets.VERCEL_DOMAIN }}/api/idea-engine?action=send-digest" \
            -H "Authorization: Bearer ${{ secrets.IDEA_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -S

      - name: Check for failures
        if: failure()
        run: echo "Email digest failed - check Vercel logs"
