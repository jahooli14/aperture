name: Idea Engine - Generate

on:
  schedule:
    # Run every 11 minutes: */11 * * * *
    # This generates ~131 ideas/day (~43 pass filter/day)
    - cron: '*/11 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger idea generation
        run: |
          curl -X POST "https://${{ secrets.VERCEL_DOMAIN }}/api/idea-engine?action=generate" \
            -H "Authorization: Bearer ${{ secrets.IDEA_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -S

      - name: Check for failures
        if: failure()
        run: echo "Idea generation failed - check Vercel logs"
