name: Cron

# Multi-schedule dispatcher.
#
# Previously used a single `*/30 * * * *` trigger with wall-clock time checks
# (date -u +%H / +%M) to decide which jobs to run. That was broken: GitHub
# Actions scheduled workflows are routinely delayed at the top of the hour
# (docs: "High load times include the start of every hour"), so the 09:00 UTC
# run would actually fire at 09:05–09:20, MIN was no longer "00", and the
# daily digest / review blocks were silently skipped. Result: no email for days.
#
# This version registers each cron as its own schedule entry and branches on
# `github.event.schedule` — the cron string that *triggered* the run, which is
# stable regardless of how much GitHub delayed execution.
#
# Budget unchanged: ~1,500–1,700 min/month, well within the 2,000 free tier.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min: generator + fix-queue runner
    - cron: '0 */6 * * *'    # every 6h: fix-queue drafter + polymath heat recompute
    - cron: '0 8 * * *'      # 08:00 UTC daily: polymath evolve
    - cron: '0 9 * * *'      # 09:00 UTC daily: idea-engine review + email digest
    - cron: '0 8 * * 0'      # Sunday 08:00 UTC: polymath drawer digest
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-run all jobs regardless of schedule'
        required: false
        default: 'false'

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Dispatch
        env:
          # Hardcoded to the known-working polymath production domain.
          # Previously used ${{ secrets.VERCEL_DOMAIN }} but that secret was
          # the cause of repeated "curl DNS failure" incidents (see commit
          # a00c314). Hardcoding removes an invisible failure mode.
          BASE:     https://aper-ture.vercel.app
          TOKEN:    ${{ secrets.IDEA_ENGINE_SECRET }}
          SCHEDULE: ${{ github.event.schedule }}
          FORCE:    ${{ github.event.inputs.force }}
        run: |
          set -u

          FAILED_FILE=$(mktemp)

          hit() {
            echo "→ $1"
            # Timeout must exceed the Vercel maxDuration (60s) to avoid
            # racing cold-start + network overhead against function execution.
            if ! curl -fsS -m 90 -X POST "$BASE$1" \
                 -H "Authorization: Bearer $TOKEN" \
                 -H "Content-Type: application/json"; then
              echo "!! failed: $1" | tee -a "$FAILED_FILE"
            fi
          }

          echo "Triggered by: ${SCHEDULE:-workflow_dispatch}"

          # ── Every 30 min ──────────────────────────────────────────────
          # Idea Engine generator fires twice an hour.
          # Fix Queue runner catches approved fixes on 30-min granularity.
          if [ "$SCHEDULE" = "*/30 * * * *" ] || [ "$FORCE" = "true" ]; then
            hit "/api/idea-engine?action=generate" &
            hit "/api/fix-queue?action=run-fixes" &
          fi

          # ── Every 6h: Fix Queue drafter + Polymath heat recompute ─────
          if [ "$SCHEDULE" = "0 */6 * * *" ] || [ "$FORCE" = "true" ]; then
            hit "/api/fix-queue?action=draft-pending" &
            hit "/api/projects?resource=recompute-heat" &
          fi

          # ── 08:00 UTC daily: Polymath evolve ──────────────────────────
          if [ "$SCHEDULE" = "0 8 * * *" ] || [ "$FORCE" = "true" ]; then
            hit "/api/projects?resource=evolve" &
          fi

          # ── 09:00 UTC daily: Idea Engine review + email digest ────────
          # Run sequentially (no &) so the digest sees ideas the review just
          # approved.
          if [ "$SCHEDULE" = "0 9 * * *" ] || [ "$FORCE" = "true" ]; then
            hit "/api/idea-engine?action=review"
            hit "/api/idea-engine?action=send-digest"
          fi

          # ── Sunday 08:00 UTC: Polymath drawer digest ──────────────────
          if [ "$SCHEDULE" = "0 8 * * 0" ] || [ "$FORCE" = "true" ]; then
            hit "/api/projects?resource=generate-digest" &
          fi

          wait

          if [ -s "$FAILED_FILE" ]; then
            echo ""
            echo "::error::One or more cron endpoints failed:"
            cat "$FAILED_FILE"
            exit 1
          fi

          echo "✓ cron dispatch complete"
