name: Fix Queue - Draft Fixes

on:
  schedule:
    # Run every 6 hours - drafts fixes for new annoyances
    # Low frequency since annoyances trickle in throughout the day
    - cron: '15 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Draft pending fixes
        run: |
          curl -f -X POST "${{ secrets.VERCEL_DOMAIN }}/api/fix-queue?action=draft-pending" \
            -H "Authorization: Bearer ${{ secrets.IDEA_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -S

      - name: Check for failures
        if: failure()
        run: echo "Fix drafting failed - check Vercel logs"
