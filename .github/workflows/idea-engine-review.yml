name: Idea Engine - Opus Review

on:
  schedule:
    # Run 3x/day: 8am, 2pm, 8pm UTC for faster iteration
    # Cron: minute hour day month weekday
    - cron: '0 8,14,20 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Opus review
        run: |
          curl -X POST "https://${{ secrets.VERCEL_DOMAIN }}/api/idea-engine?action=review" \
            -H "Authorization: Bearer ${{ secrets.IDEA_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -S

      - name: Check for failures
        if: failure()
        run: echo "Opus review failed - check Vercel logs"
