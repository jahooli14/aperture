name: Idea Engine

on:
  schedule:
    # Generate: Every 11 minutes (~131 ideas/day)
    - cron: '*/11 * * * *'
    # Review: Once daily at 8am UTC (before digest)
    - cron: '0 8 * * *'
    # Digest: Daily at 8:30am UTC (after review completes)
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        type: choice
        options:
          - generate
          - review
          - send-digest

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            MINUTE=$(date +%M)
            HOUR=$(date +%H)

            # Generate runs every 11 minutes
            if [ $((MINUTE % 11)) -eq 0 ]; then
              echo "action=generate" >> $GITHUB_OUTPUT
            # Review runs once daily at 8am UTC
            elif [ "$HOUR" = "08" ] && [ "$MINUTE" = "00" ]; then
              echo "action=review" >> $GITHUB_OUTPUT
            # Digest runs at 8:30am UTC (after review)
            elif [ "$HOUR" = "08" ] && [ "$MINUTE" = "30" ]; then
              echo "action=send-digest" >> $GITHUB_OUTPUT
            else
              echo "action=none" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Idea Engine
        if: steps.determine.outputs.action != 'none'
        run: |
          curl -X POST "https://polymath-dan.vercel.app/api/idea-engine?action=${{ steps.determine.outputs.action }}" \
            -H "Authorization: Bearer ${{ secrets.IDEA_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            --fail-with-body
